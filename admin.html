<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Bellacone</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
  :root {
    --cream: #fdf6ee;
    --warm: #f5e6d0;
    --brown: #5c3d2e;
    --accent: #c9663c;
    --soft: #e8d5c0;
    --text: #2d1f14;
    --muted: #8a6a56;
    --card: #fff9f3;
    --green: #3a9b65;
    --red: #c0392b;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  .header {
    background: var(--brown);
    color: #fff;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header-badge {
    font-size: 12px;
    background: rgba(255,255,255,0.15);
    padding: 4px 12px;
    border-radius: 999px;
  }

  .tabs {
    background: var(--warm);
    border-bottom: 1px solid var(--soft);
    display: flex;
    padding: 0 1.5rem;
    gap: 0;
  }
  .tab {
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .tab.active { color: var(--brown); border-bottom-color: var(--accent); }

  .panel { display: none; padding: 1.5rem; }
  .panel.active { display: block; }

  .section-card {
    background: var(--card);
    border: 1px solid var(--soft);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-header h2 { font-size: 15px; font-weight: 600; color: var(--brown); }

  /* FORM */
  .form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 100px; }
  .form-group label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .form-input {
    border: 1px solid var(--soft);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 14px;
    background: #fff;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .emoji-select {
    width: 60px;
    text-align: center;
    font-size: 20px;
    padding: 4px 6px;
  }

  .add-btn {
    padding: 8px 16px;
    background: var(--brown);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.85; }

  /* LIST */
  .item-list { display: flex; flex-direction: column; gap: 6px; }
  .item-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--cream);
    border-radius: 10px;
    border: 1px solid var(--soft);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .item-left { display: flex; align-items: center; gap: 8px; }
  .item-emoji { font-size: 18px; }
  .item-info { display: flex; flex-direction: column; }
  .item-name { font-size: 13px; font-weight: 500; }
  .item-price { font-size: 12px; color: var(--muted); }
  .del-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--soft);
    background: transparent;
    color: var(--red);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .del-btn:hover { background: #fff0f0; }

  /* CHIP LIST */
  .chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.75rem; }
  .chip-item {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--cream);
    border: 1px solid var(--soft);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 13px;
  }
  .chip-del {
    background: none; border: none; cursor: pointer;
    color: var(--red); font-size: 14px; line-height: 1; padding: 0;
  }

  /* QR */
  .url-input-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 1rem; }
  .url-input-row .form-group { flex: 1; }
  .qr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-top: 1rem;
  }
  .qr-card {
    background: #fff;
    border: 1px solid var(--soft);
    border-radius: var(--radius);
    padding: 1rem;
    text-align: center;
  }
  .qr-card canvas { width: 100% !important; height: auto !important; }
  .qr-masa { font-size: 13px; font-weight: 600; color: var(--brown); margin-top: 8px; }
  .qr-download {
    margin-top: 6px;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    display: block;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }
  .gen-btn {
    padding: 10px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.15s;
  }
  .gen-btn:hover { opacity: 0.85; }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--brown);
    color: #fff;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .loading { text-align: center; padding: 1rem; color: var(--muted); font-size: 13px; }
  .empty-list { font-size: 13px; color: var(--muted); font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <h1>Admin Paneli — Bellacone</h1>
  <span class="header-badge">Yönetim</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('menu', this)">Menü Düzenle</button>
  <button class="tab" onclick="switchTab('qr', this)">QR Kodlar</button>
</div>

<!-- MENÜ PANELİ -->
<div class="panel active" id="panel-menu">

  <!-- Dondurma -->
  <div class="section-card">
    <div class="section-header"><h2>Dondurma Çeşitleri</h2></div>
    <div class="form-row">
      <div class="form-group" style="flex:0 0 60px;">
        <label>Emoji</label>
        <input class="form-input emoji-select" id="d-emoji" type="text" value="🍦" maxlength="2">
      </div>
      <div class="form-group">
        <label>İsim</label>
        <input class="form-input" id="d-isim" type="text" placeholder="Çikolatalı">
      </div>
      <div class="form-group" style="flex:0 0 100px;">
        <label>Fiyat (₺)</label>
        <input class="form-input" id="d-fiyat" type="number" placeholder="45">
      </div>
      <button class="add-btn" onclick="addDondurma()">Ekle</button>
    </div>
    <div class="item-list" id="dondurma-list"><div class="loading">Yükleniyor...</div></div>
  </div>

  <!-- Malzeme -->
  <div class="section-card">
    <div class="section-header"><h2>Waffle Malzemeleri</h2></div>
    <div class="form-row">
      <div class="form-group">
        <label>Malzeme adı</label>
        <input class="form-input" id="m-isim" type="text" placeholder="Muz, Çilek...">
      </div>
      <button class="add-btn" onclick="addChip('malzeme', 'm-isim')">Ekle</button>
    </div>
    <div class="chip-list" id="malzeme-list"><div class="loading">Yükleniyor...</div></div>
  </div>

  <!-- Sos -->
  <div class="section-card">
    <div class="section-header"><h2>Soslar</h2></div>
    <div class="form-row">
      <div class="form-group">
        <label>Sos adı</label>
        <input class="form-input" id="s-isim" type="text" placeholder="Çikolata Sosu...">
      </div>
      <button class="add-btn" onclick="addChip('sos', 's-isim')">Ekle</button>
    </div>
    <div class="chip-list" id="sos-list"><div class="loading">Yükleniyor...</div></div>
  </div>

  <!-- Ekstra -->
  <div class="section-card">
    <div class="section-header"><h2>Ekstra Seçenekler</h2></div>
    <div class="form-row">
      <div class="form-group">
        <label>Ekstra adı</label>
        <input class="form-input" id="e-isim" type="text" placeholder="Krem Şanti...">
      </div>
      <button class="add-btn" onclick="addChip('ekstra', 'e-isim')">Ekle</button>
    </div>
    <div class="chip-list" id="ekstra-list"><div class="loading">Yükleniyor...</div></div>
  </div>
</div>

<!-- QR PANELİ -->
<div class="panel" id="panel-qr">
  <div class="section-card">
    <div class="section-header"><h2>QR Kod Oluştur</h2></div>
    <p style="font-size:13px; color:var(--muted); margin-bottom:1rem;">
      Müşteri menüsünün URL'sini gir, kaç masa var seç, QR kodları oluştur ve indir. Her masa kendi QR koduna sahip olur.
    </p>
    <div class="url-input-row">
      <div class="form-group">
        <label>Menü URL (menu.html dosyanın yayın adresi)</label>
        <input class="form-input" id="menu-url" type="text" placeholder="https://sizin-site.com/menu.html">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:0 0 120px;">
        <label>Başlangıç masa</label>
        <input class="form-input" id="masa-start" type="number" value="1" min="1">
      </div>
      <div class="form-group" style="flex:0 0 120px;">
        <label>Bitiş masa</label>
        <input class="form-input" id="masa-end" type="number" value="10" min="1">
      </div>
      <button class="gen-btn" onclick="generateQRs()">QR Kodları Oluştur</button>
    </div>
    <div class="qr-grid" id="qr-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, push, set, remove, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  // ====================================================
  // BURAYA KENDİ FİREBASE BİLGİLERİNİ GİR
  // ====================================================
  const firebaseConfig = {
    apiKey: "AIzaSyC18gKyPhFWEWH_244nDLOW0nQE2QgS6kA",
    authDomain: "bellacone-7ee34.firebaseapp.com",
    databaseURL: "https://bellacone-7ee34-default-rtdb.firebaseio.com",
    projectId: "bellacone-7ee34",
    storageBucket: "bellacone-7ee34.firebasestorage.app",
    messagingSenderId: "41187589256",
    appId: "1:41187589256:web:75e6f2f3c3360c9a3bf33d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Menü dinle
  onValue(ref(db, 'menu'), (snapshot) => {
    const data = snapshot.val() || {};
    renderDondurmaList(data.dondurma || {});
    renderChipList('malzeme', data.malzeme || []);
    renderChipList('sos', data.sos || []);
    renderChipList('ekstra', data.ekstra || []);
  });

  function renderDondurmaList(dondurmaObj) {
    const list = document.getElementById('dondurma-list');
    const items = Object.entries(dondurmaObj);
    if (!items.length) { list.innerHTML = '<span class="empty-list">Henüz dondurma eklenmedi</span>'; return; }
    list.innerHTML = items.map(([key, d]) => `
      <div class="item-row">
        <div class="item-left">
          <span class="item-emoji">${d.emoji || '🍦'}</span>
          <div class="item-info">
            <span class="item-name">${d.isim}</span>
            <span class="item-price">${d.fiyat} ₺</span>
          </div>
        </div>
        <button class="del-btn" onclick="delDondurma('${key}')">×</button>
      </div>
    `).join('');
  }

  function renderChipList(type, arr) {
    const list = document.getElementById(type + '-list');
    if (!arr.length) { list.innerHTML = '<span class="empty-list">Henüz eklenmedi</span>'; return; }
    list.innerHTML = arr.map((item, i) => `
      <div class="chip-item">
        ${item}
        <button class="chip-del" onclick="delChip('${type}', ${i})">×</button>
      </div>
    `).join('');
  }

  window.addDondurma = async function() {
    const emoji = document.getElementById('d-emoji').value.trim() || '🍦';
    const isim = document.getElementById('d-isim').value.trim();
    const fiyat = parseFloat(document.getElementById('d-fiyat').value);
    if (!isim || isNaN(fiyat)) { showToast('İsim ve fiyat girin'); return; }
    const id = 'd' + Date.now();
    await set(ref(db, 'menu/dondurma/' + id), { id, isim, fiyat, emoji });
    document.getElementById('d-isim').value = '';
    document.getElementById('d-fiyat').value = '';
    showToast('Dondurma eklendi');
  };

  window.delDondurma = async function(key) {
    await remove(ref(db, 'menu/dondurma/' + key));
    showToast('Silindi');
  };

  // Chip ekleme için önce mevcut listeyi çek
  window.addChip = function(type, inputId) {
    const val = document.getElementById(inputId).value.trim();
    if (!val) return;
    // Mevcut listeyi al ve yenisini ekle
    const listEl = document.getElementById(type + '-list');
    const chips = Array.from(listEl.querySelectorAll('.chip-item'))
      .map(el => el.childNodes[0].textContent.trim());
    if (chips.includes(val)) { showToast('Zaten mevcut'); return; }
    chips.push(val);
    set(ref(db, 'menu/' + type), chips).then(() => {
      document.getElementById(inputId).value = '';
      showToast('Eklendi');
    });
  };

  window.delChip = function(type, idx) {
    const listEl = document.getElementById(type + '-list');
    const chips = Array.from(listEl.querySelectorAll('.chip-item'))
      .map(el => el.childNodes[0].textContent.trim());
    chips.splice(idx, 1);
    set(ref(db, 'menu/' + type), chips).then(() => showToast('Silindi'));
  };

  // QR Üretimi
  window.generateQRs = function() {
    const baseUrl = document.getElementById('menu-url').value.trim();
    const start = parseInt(document.getElementById('masa-start').value);
    const end = parseInt(document.getElementById('masa-end').value);
    if (!baseUrl) { showToast('Menü URL girin'); return; }
    if (isNaN(start) || isNaN(end) || start > end) { showToast('Geçerli masa aralığı girin'); return; }

    const grid = document.getElementById('qr-grid');
    grid.innerHTML = '';

    for (let masa = start; masa <= end; masa++) {
      const url = baseUrl + (baseUrl.includes('?') ? '&' : '?') + 'masa=' + masa;
      const card = document.createElement('div');
      card.className = 'qr-card';

      const canvas = document.createElement('canvas');
      card.appendChild(canvas);

      const masaLabel = document.createElement('div');
      masaLabel.className = 'qr-masa';
      masaLabel.textContent = 'Masa ' + masa;
      card.appendChild(masaLabel);

      const dlBtn = document.createElement('button');
      dlBtn.className = 'qr-download';
      dlBtn.textContent = 'İndir';
      dlBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'masa-' + masa + '-qr.png';
        link.href = canvas.toDataURL();
        link.click();
      };
      card.appendChild(dlBtn);

      grid.appendChild(card);

      QRCode.toCanvas(canvas, url, { width: 150, margin: 1, color: { dark: '#5c3d2e', light: '#fff9f3' } });
    }
    showToast(end - start + 1 + ' QR kod oluşturuldu');
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  window.switchTab = function(tab, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    el.classList.add('active');
  };
</script>
</body>
</html>
