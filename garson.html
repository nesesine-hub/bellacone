<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garson Ekranı — Tatlı Dünya</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1108;
    --surface: #251a0e;
    --surface2: #2e2010;
    --border: rgba(255,255,255,0.08);
    --accent: #e07840;
    --green: #4caf7a;
    --yellow: #f0b840;
    --text: #f5ede4;
    --muted: #8a7060;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .stat-pills { display: flex; gap: 8px; }
  .pill {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 999px;
    font-weight: 500;
  }
  .pill-bekliyor { background: rgba(240,184,64,0.15); color: var(--yellow); }
  .pill-hazir { background: rgba(76,175,122,0.15); color: var(--green); }

  /* FILTERS */
  .filter-bar {
    padding: 0.75rem 1.5rem;
    display: flex;
    gap: 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* GRID */
  .orders-grid {
    padding: 1.25rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  /* CARD */
  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease;
  }
  .order-card.yeni { border-color: var(--accent); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .masa-num {
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
  }
  .status-badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 500;
  }
  .badge-bekliyor { background: rgba(240,184,64,0.15); color: var(--yellow); }
  .badge-hazir { background: rgba(76,175,122,0.15); color: var(--green); }

  .dondurma-row {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .detail-row {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 3px;
    line-height: 1.5;
  }
  .zaman-row {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .act-btn {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .act-btn:hover { background: var(--surface2); color: var(--text); }
  .act-btn.primary {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }
  .act-btn.primary:hover { opacity: 0.85; }
  .act-btn.geri {
    background: var(--surface2);
    color: var(--yellow);
    border-color: rgba(240,184,64,0.3);
  }

  /* EMPTY */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 1rem; }
  .empty p { font-size: 15px; }

  /* LOADING */
  .loading { text-align: center; padding: 4rem; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="live-dot"></div>
    <h1>Garson Ekranı</h1>
  </div>
  <div class="stat-pills">
    <span class="pill pill-bekliyor" id="stat-bekliyor">0 bekliyor</span>
    <span class="pill pill-hazir" id="stat-hazir">0 hazır</span>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('hepsi', this)">Hepsi</button>
  <button class="filter-btn" onclick="setFilter('bekliyor', this)">Bekleyenler</button>
  <button class="filter-btn" onclick="setFilter('hazir', this)">Hazırlar</button>
</div>

<div class="orders-grid" id="orders-grid">
  <div class="loading">Siparişler yükleniyor...</div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue, update, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  // ====================================================
  // BURAYA KENDİ FİREBASE BİLGİLERİNİ GİR
  // ====================================================
  const firebaseConfig = {
    apiKey: "AIzaSyC18gKyPhFWEWH_244nDLOW0nQE2QgS6kA",
    authDomain: "bellacone-7ee34.firebaseapp.com",
    databaseURL: "https://bellacone-7ee34-default-rtdb.firebaseio.com",
    projectId: "bellacone-7ee34",
    storageBucket: "bellacone-7ee34.firebasestorage.app",
    messagingSenderId: "41187589256",
    appId: "1:41187589256:web:75e6f2f3c3360c9a3bf33d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let allOrders = [];
  let currentFilter = 'hepsi';
  let isFirstLoad = true;

  onValue(ref(db, 'siparisler'), (snapshot) => {
    const data = snapshot.val() || {};
    allOrders = Object.entries(data).map(([key, val]) => ({ key, ...val }))
      .sort((a, b) => new Date(a.zaman) - new Date(b.zaman));
    renderOrders();
    if (!isFirstLoad) playSound();
    isFirstLoad = false;
  });

  function renderOrders() {
    const grid = document.getElementById('orders-grid');
    const bekliyor = allOrders.filter(o => o.durum === 'bekliyor').length;
    const hazir = allOrders.filter(o => o.durum === 'hazir').length;
    document.getElementById('stat-bekliyor').textContent = bekliyor + ' bekliyor';
    document.getElementById('stat-hazir').textContent = hazir + ' hazır';

    const filtered = currentFilter === 'hepsi' ? allOrders
      : allOrders.filter(o => o.durum === currentFilter);

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">🍦</div><p>Şu an ${currentFilter === 'hepsi' ? 'sipariş yok' : currentFilter === 'bekliyor' ? 'bekleyen sipariş yok' : 'hazır sipariş yok'}</p></div>`;
      return;
    }

    grid.innerHTML = filtered.map(o => {
      const extras = [
        o.malzeme?.length ? 'Malzeme: ' + o.malzeme.join(', ') : '',
        o.sos?.length ? 'Sos: ' + o.sos.join(', ') : '',
        o.ekstra?.length ? 'Ekstra: ' + o.ekstra.join(', ') : '',
      ].filter(Boolean);

      return `<div class="order-card ${o.durum === 'bekliyor' ? 'yeni' : ''}">
        <div class="card-top">
          <div class="masa-num">Masa ${o.masa}</div>
          <span class="status-badge ${o.durum === 'bekliyor' ? 'badge-bekliyor' : 'badge-hazir'}">
            ${o.durum === 'bekliyor' ? 'Bekliyor' : 'Hazır'}
          </span>
        </div>
        <div class="dondurma-row">${o.dondurma} × ${o.miktar}</div>
        ${extras.map(e => `<div class="detail-row">${e}</div>`).join('')}
        ${o.not ? `<div class="detail-row" style="color:#e07840;">Not: ${o.not}</div>` : ''}
        <div class="zaman-row">${o.zamanStr || ''} &middot; ${o.toplamFiyat || 0} ₺</div>
        <div class="card-actions">
          ${o.durum === 'bekliyor'
            ? `<button class="act-btn primary" onclick="setDurum('${o.key}', 'hazir')">Hazır</button>`
            : `<button class="act-btn geri" onclick="setDurum('${o.key}', 'bekliyor')">Geri Al</button>`
          }
          <button class="act-btn" onclick="sil('${o.key}')">Sil</button>
        </div>
      </div>`;
    }).join('');
  }

  window.setFilter = function(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderOrders();
  };

  window.setDurum = async function(key, durum) {
    await update(ref(db, 'siparisler/' + key), { durum });
  };

  window.sil = async function(key) {
    await remove(ref(db, 'siparisler/' + key));
  };

  function playSound() {
    try {
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(); osc.stop(ctx.currentTime + 0.4);
    } catch(e) {}
  }
</script>
</body>
</html>
